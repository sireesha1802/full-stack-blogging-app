
name: CI-CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: sireeshahub1802/java

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Application
        run: mvn clean package

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:${{ github.run_number }} .

      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME:${{ github.run_number }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
        
      - name: Configure EKS Access
        run: |
          aws eks update-kubeconfig --name java --region us-east-1

      - name: Deploy to EKS
        run: |
          pwd
          cat deployment-service.yml
          sed -i "s|image: .*|image: $IMAGE_NAME:${{ github.run_number }}|g" deployment-service.yaml
          cat deployment-service.yml
          kubectl get nodes
          kubectl apply -f deployment-service.yaml
